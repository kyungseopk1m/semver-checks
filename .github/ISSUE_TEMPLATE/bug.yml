name: Bug Report
description: Report a bug in semver-checks
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal reproduction steps or a link to a repository
      placeholder: |
        1. Run `npx semver-checks compare ...`
        2. Expected: ...
        3. Actual: ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: semver-checks version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "22.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Logs, tsconfig details, screenshots, or anything else that might help
    validations:
      required: false
