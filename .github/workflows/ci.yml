name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Package quality check
        run: npm run check

      # Dogfood: run semver-checks on itself against the last published release.
      # Informational smoke run only — no --strict, and continue-on-error, so a
      # legitimate MAJOR (or a registry/network hiccup) never blocks CI. It logs
      # the recommended bump and is a crash canary on the tool's own public API;
      # it does not gate, so it cannot by itself prevent a regression.
      - name: Dogfood (self semver check)
        continue-on-error: true
        timeout-minutes: 5
        run: node bin/semver-checks.js compare semver-checks@latest .
